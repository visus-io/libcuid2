name: Continuous Integration

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'man/**'
      - 'debian/**'
      - 'rpm/**'
      - 'renovate.json'
      - 'LICENSE'
      - '.gitignore'
      - '.github/workflows/lint_pullrequest.yml'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'man/**'
      - 'debian/**'
      - 'rpm/**'
      - 'renovate.json'
      - 'LICENSE'
      - '.gitignore'
      - '.github/workflows/lint_pullrequest.yml'
      - '.github/ISSUE_TEMPLATE/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
      actions: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup build tools
        uses: lukka/get-cmake@7bfc9baacbbdcb5e37957ad05c3546b3e222be3c # v4.3.2
        with:
          cmakeVersion: '~3.28.0'
          ninjaVersion: '^1.12.0'

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            libboost-all-dev \
            libfmt-dev \
            python3-pip
          pip3 install gcovr==8.4

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2 # v11.6

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DBUILD_TESTS=ON \
            -DENABLE_COVERAGE=ON \
            -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_OVERLAY_PORTS=${{ github.workspace }}/cmake/vcpkg/ports \
            -DVCPKG_OVERLAY_TRIPLETS=${{ github.workspace }}/cmake/vcpkg/triplets

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=Debug `
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON `
            -DBUILD_TESTS=ON `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build

      - name: Verify Linux linkage
        if: runner.os == 'Linux'
        run: |
          echo "Checking library dependencies..."
          ldd build/libcuid2.so | grep -E "(openssl|boost|fmt)" || echo "No system libraries found in ldd output"
          echo ""
          echo "Verifying system libraries are used (not vcpkg)..."
          if ldd build/libcuid2.so | grep -q "vcpkg_installed"; then
            echo "ERROR: vcpkg libraries detected instead of system libraries!"
            exit 1
          else
            echo "SUCCESS: Using system libraries"
          fi

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Coverage
        if: runner.os == 'Linux'
        run: |
          cd build
          gcovr . \
            --root .. \
            --sonarqube coverage.xml \
            --filter '../src/' \
            --exclude '../src/cuid2gen.cpp' \
            --print-summary

          # Remove branch coverage attributes from SonarQube XML
          # This excludes compiler-generated STL branches that cannot be meaningfully tested
          sed -i.bak 's/ branchesToCover="[0-9]*"//g; s/ coveredBranches="[0-9]*"//g' coverage.xml

      - name: Upload SonarQube artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sonarqube-artifacts
          path: |
            build/coverage.xml
            build/compile_commands.json
          retention-days: 1

  sonar-analyze:
    name: SonarQube Analysis
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]'
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Download SonarQube artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sonarqube-artifacts
          path: build/

      - name: Analyze
        uses: SonarSource/sonarqube-scan-action@c7ee0f9df90b7aa20e8dcf9695dcfe2e7da5b4f2 # v7.2.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
